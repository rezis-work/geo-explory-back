# Secret: ANTHROPIC_API_KEY (repo Settings → Secrets and variables → Actions).
# https://github.com/anthropics/claude-code-action
#
# GitHub only runs workflows from .github/workflows at the *repository root*.
# Use this when `backend/` is its own Git repo. If backend lives inside a parent
# monorepo, either make the parent repo’s root workflow call tooling here or split repos.
name: Claude PR review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: claude-pr-review-${{ github.repository }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowed_tools: "Bash(gh:*)"
          claude_args: "--model claude-haiku-4-5-20251001"
          prompt: |
            Review the pull request ${{ github.event.pull_request.number }} in ${{ github.repository }}.

            This is the **backend** service (pnpm + Turborepo, TypeScript, Express apps under `apps/`, shared code under `packages/`).

            Focus on:
            - Correctness, error handling, and API design
            - Security (auth, validation, secrets, logging sensitive data)
            - TypeScript types and Zod/env usage
            - Monorepo boundaries and shared package usage

            Post a review summary as a PR comment using `gh pr comment` prefixed with **[Claude · backend]**.
