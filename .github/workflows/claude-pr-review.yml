# Secret: ANTHROPIC_API_KEY (repo Settings → Secrets and variables → Actions).
# https://github.com/anthropics/claude-code-action
#
# GitHub only runs workflows from .github/workflows at the *repository root*.
# Use this when `backend/` is its own Git repo. If backend lives inside a parent
# monorepo, either make the parent repo’s root workflow call tooling here or split repos.
name: Claude PR review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: claude-pr-review-${{ github.repository }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        continue-on-error: true
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-haiku-4-5-20251001
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            This repository is the **backend** service (pnpm + Turborepo, TypeScript, Express apps under `apps/`, shared code under `packages/`).

            Focus on:
            - Correctness, error handling, and API design
            - Security (auth, validation, secrets, logging sensitive data)
            - TypeScript types and Zod/env usage
            - Monorepo boundaries and shared package usage

            The PR branch is already checked out.

            Use `gh pr comment` for a short summary (prefix with **[Claude · backend]**).
            Use `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`) for concrete issues.

            Only post GitHub comments—do not paste the full review as a workflow log only.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
